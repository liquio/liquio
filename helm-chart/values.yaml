# Global configuration that applies to all Liquio components
global:
  # Base domain for all Liquio services (used for ingress hostnames)
  domain: liquio.local
  # URL scheme used in frontend config.json files. Set to "https" when TLS is
  # enabled (e.g. ingress.selfSigned.enabled=true) so browser requests to APIs
  # are not blocked as mixed content.
  scheme: https
  # Override image registry for all services (empty = use default Docker Hub)
  imageRegistry: ""
  # Secrets for pulling images from private registries
  imagePullSecrets: []

# Database migrations configuration
migrations:
  # Whether to run database schema migrations on deployment
  enabled: true
  # Automatically delete completed Job pods after this many seconds.
  # Set to 0 to delete immediately; unset (null) to keep indefinitely.
  ttlSecondsAfterFinished: 600
  # Resource requests and limits for migration job containers.
  # Migration jobs are short-lived; these values are intentionally conservative.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Default image configuration for all services
image:
  # Image registry — default points to GHCR under the liquio org.
  # Override to use a private registry, e.g. registry.example.com/liquio
  registry: ghcr.io/liquio
  # Image pull policy: Always, IfNotPresent, Never
  pullPolicy: IfNotPresent
  # Global fallback tag used when a service has no entry in serviceVersions
  tag: "0.1.0"

# Per-service image versions — keyed by component name (kebab-case).
# Each value is used as the image tag for that service.
# Override individual entries to roll out a new version of a single service.
serviceVersions:
  admin-api: "0.1.0"
  admin-front: "0.1.0"
  cabinet-api: "0.1.0"
  cabinet-front: "0.1.0"
  event: "0.1.0"
  external-reader: "0.1.0"
  filestorage: "0.1.0"
  gateway: "0.1.0"
  id-api: "0.1.0"
  id-front: "0.1.0"
  manager: "0.1.0"
  notification: "0.1.0"
  register: "0.1.0"
  sign-tool: "0.1.0"
  task: "0.1.0"

# Liquio microservices configuration
services:
  # Identity Frontend - User authentication and login interface
  idFront:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 8080
    # Container target port
    targetPort: 8080
    # External service port
    servicePort: 8080
    image:
      repository: id-front

  # Admin Frontend - Administrative interface for system management
  adminFront:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 8080
    # Container target port (nginx serves on port 8080)
    targetPort: 8080
    # External service port
    servicePort: 8080
    image:
      repository: admin-front

  # Cabinet Frontend - Document management interface
  cabinetFront:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 8080
    # Container target port (nginx serves on port 8080)
    targetPort: 8080
    # External service port
    servicePort: 8080
    image:
      repository: cabinet-front

  # Identity API - Authentication and user management backend
  idApi:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 8100
    # Container target port
    targetPort: 8100
    # External service port
    servicePort: 8100
    image:
      repository: id-api

  # Admin API - Administrative backend services and management operations
  adminApi:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 8102
    # Container target port
    targetPort: 8102
    # External service port
    servicePort: 8102
    image:
      repository: admin-api

  # Cabinet API - Document management and storage backend
  cabinetApi:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 8101
    # Container target port
    targetPort: 8101
    # External service port
    servicePort: 8101
    image:
      repository: cabinet-api

  # External Reader - Service for reading external data sources
  externalReader:
    # Whether to deploy this service (disabled by default)
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 8106
    # Container target port
    targetPort: 8106
    # External service port
    servicePort: 8106
    image:
      repository: external-reader

  # File Storage - Service for managing file uploads and storage
  filestorage:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 8105
    # Container target port
    targetPort: 8105
    # External service port
    servicePort: 8105
    image:
      repository: filestorage

  # Event Service - Handles system events and messaging
  event:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 3000
    # Container target port
    targetPort: 3000
    # External service port
    servicePort: 3000
    image:
      repository: event

  # Gateway Service - API gateway and routing
  gateway:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 7003
    # Container target port
    targetPort: 7003
    # External service port
    servicePort: 7003
    image:
      repository: gateway

  # Manager Service - Core business logic and workflow management
  manager:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 3002
    # Container target port
    targetPort: 3002
    # External service port
    servicePort: 3002
    image:
      repository: manager

  # Notification Service - Handles system notifications and alerts
  notification:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 3003
    # Container target port
    targetPort: 3003
    # External service port
    servicePort: 3003
    image:
      repository: notification

  # Register Service - Registry and metadata management
  register:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 8103
    # Container target port
    targetPort: 8103
    # External service port
    servicePort: 8103
    image:
      repository: register

  # Sign Tool Service - Digital signature and cryptographic operations
  signTool:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 3004
    # Container target port
    targetPort: 3004
    # External service port
    servicePort: 3004
    image:
      repository: sign-tool

  # Task Service - Task management and scheduling
  task:
    # Whether to deploy this service
    enabled: true
    # Number of pod replicas
    replicaCount: 1
    # Kubernetes service port
    port: 3000
    # Container target port
    targetPort: 3000
    # External service port
    servicePort: 3000
    image:
      repository: task

# PostgreSQL database configuration
postgresql:
  # Deploy bundled PostgreSQL for local/non-production environments.
  # For production, set enabled: false and configure external DB via config.database.*
  enabled: true
  image:
    # Override image registry (empty = use default)
    registry: ""
    # PostgreSQL Docker image repository
    repository: postgres
    # PostgreSQL version tag
    tag: "18"
  # Database authentication configuration
  auth:
    # Database username
    username: postgres
    # Database password
    password: "testpassword"
    # Default database name
    database: postgres
  # Primary database instance configuration
  primary:
    persistence:
      # Whether to enable persistent storage for database
      enabled: false
    # Resource limits and requests for the database pod
    resources:
      requests:
        # Minimum memory allocation
        memory: "256Mi"
        # Minimum CPU allocation
        cpu: "100m"
      limits:
        # Maximum memory allocation
        memory: "512Mi"
        # Maximum CPU allocation
        cpu: "500m"
  # Persistence configuration (legacy, use primary.persistence instead)
  persistence:
    # Whether to enable persistent storage
    enabled: false
    # Storage size
    size: 1Gi

# RabbitMQ message broker configuration
rabbitmq:
  # Deploy bundled RabbitMQ for local/non-production environments.
  # For production, set enabled: false and configure external broker via config.rabbitmq.*
  enabled: true
  # Authentication configuration
  auth:
    # RabbitMQ username
    username: guest
    # RabbitMQ password
    password: "testpassword"
  # Persistence configuration
  persistence:
    # Whether to enable persistent storage for messages
    enabled: false
    # Storage size
    size: 1Gi
  # Resource limits and requests for RabbitMQ pod
  resources:
    requests:
      # Minimum memory allocation
      memory: "256Mi"
      # Minimum CPU allocation
      cpu: "100m"
    limits:
      # Maximum memory allocation
      memory: "512Mi"
      # Maximum CPU allocation
      cpu: "500m"

# Redis cache and session store configuration
redis:
  # Deploy bundled Redis for local/non-production environments.
  # For production, set enabled: false and configure external Redis via config.redis.*
  enabled: true
  # Authentication configuration
  auth:
    # Whether to enable Redis authentication (disabled for simplicity)
    enabled: false
  # Master instance configuration
  master:
    persistence:
      # Whether to enable persistent storage for Redis data
      enabled: false
    # Resource limits and requests for Redis pod
    resources:
      requests:
        # Minimum memory allocation
        memory: "128Mi"
        # Minimum CPU allocation
        cpu: "50m"
      limits:
        # Maximum memory allocation
        memory: "256Mi"
        # Maximum CPU allocation
        cpu: "200m"
  # Persistence configuration (legacy, use master.persistence instead)
  persistence:
    # Whether to enable persistent storage
    enabled: false
    # Storage size
    size: 1Gi

# Ingress configuration for external access to services
ingress:
  # Whether to enable ingress controllers
  enabled: true
  # Ingress class name (nginx for nginx-ingress controller)
  className: "nginx"
  # Raw nginx configuration snippet injected via the ingress controller.
  # Maps to nginx.ingress.kubernetes.io/configuration-snippet annotation.
  # Use this to override the Content-Security-Policy set by the frontend
  # images when deploying to environments that serve APIs over plain HTTP
  # (e.g. local Kubernetes with custom domains).
  #
  # proxy_hide_header strips the upstream container's CSP response header, then
  # add_header injects the ingress-level value so it wins. Leave empty in
  # production — the nginx.conf baked into each frontend image already allows
  # https://* in connect-src, which covers all HTTPS API endpoints.
  #
  # Requires allow-snippet-annotations: "true" in the ingress-nginx ConfigMap.
  # The ingress-nginx admission webhook must also be disabled or exempted.
  #
  # Local dev example (minikube with *.liquio.local):
  # configurationSnippet: |
  #   proxy_hide_header Content-Security-Policy;
  #   add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; worker-src blob: 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:* http://172.18.0.1:* http://*.liquio.local https://*; frame-ancestors 'self';" always;
  configurationSnippet: |
    proxy_hide_header Content-Security-Policy;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; worker-src blob: 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:* http://172.18.0.1:* http://*.liquio.local https://*; frame-ancestors 'self';" always;
  # Self-signed TLS certificate for local/dev deployments.
  # When enabled, a kubernetes.io/tls Secret is generated at helm render time
  # using Helm's built-in genSelfSignedCert function. The cert covers all hosts
  # defined in ingress.hosts and is reused on subsequent upgrades (via lookup).
  # Enable this for minikube/local deployments to get HTTPS (required for
  # crypto.randomUUID and other Secure Context browser APIs).
  selfSigned:
    enabled: true
  # Ingress annotations for configuration
  annotations:
    # Rewrite target URL for proper routing
    nginx.ingress.kubernetes.io/rewrite-target: /
  # Host configuration for different services
  hosts:
    # Identity frontend service
    - host: id.liquio.local
      paths:
        - path: /
          # Path matching type
          pathType: Prefix
          # Target service name
          service: id-front
    # Identity API service
    - host: id-api.liquio.local
      paths:
        - path: /
          pathType: Prefix
          service: id-api
    # Admin frontend service
    - host: admin.liquio.local
      paths:
        - path: /
          pathType: Prefix
          service: admin-front
    # Admin API service
    - host: admin-api.liquio.local
      paths:
        - path: /
          pathType: Prefix
          service: admin-api
    # Cabinet frontend service
    - host: cabinet.liquio.local
      paths:
        - path: /
          pathType: Prefix
          service: cabinet-front
    # Cabinet API service
    - host: cabinet-api.liquio.local
      paths:
        - path: /
          pathType: Prefix
          service: cabinet-api

# Global persistence configuration
persistence:
  # Whether to enable persistent volumes for services
  enabled: false

# Service account configuration
serviceAccount:
  # Whether to create a service account
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use (if not set, a name is generated)
  name: ""

# Pod security context
# runAsUser / runAsGroup are intentionally not set globally because backend
# services run as node (UID 1000) and frontend services run as nginx (UID 101).
# Set per-service overrides in the service's deployment values if needed.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  # fsGroup: 2000

# Container security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault

# Default resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Resource limits for init containers
initContainerResources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi

# Node selector for pod assignment
nodeSelector: {}

# Tolerations for pod assignment
tolerations: []

# Affinity for pod assignment
affinity: {}

# Application configuration settings
config:
  # Database connection configuration
  database:
    # PostgreSQL hostname (Kubernetes service name)
    host: "liquio-test-postgresql"
    # PostgreSQL port
    port: 5432
    # Database username
    username: postgres
    # Database password
    password: "testpassword"

  # RabbitMQ message broker configuration
  rabbitmq:
    # RabbitMQ hostname (Kubernetes service name)
    host: "liquio-test-rabbitmq"
    # RabbitMQ port
    port: 5672
    # RabbitMQ username
    username: guest
    # RabbitMQ password
    password: "testpassword"

  # Redis cache configuration
  redis:
    # Redis hostname (Kubernetes service name)
    host: "liquio-test-redis-master"
    # Redis port
    port: 6379

# Secret values for secure configuration
secrets:
  # Existing Kubernetes Secret name with Liquio secret keys.
  # When set, Helm does not create liquio-managed secrets and referenced
  # workloads read secret values from this Secret.
  existingSecret: ""
  # Existing Kubernetes Secret name to mount as SECRET_PATH file volume.
  # When set, per-service secret-config Secrets are not created and this Secret
  # is mounted in every service instead.
  existingSecretConfig: ""
  # Mount path for the per-service secret config volume (set as SECRET_PATH env var).
  secretConfigPath: /var/www/secret
  # PostgreSQL authentication secrets
  postgresql:
    # Database password
    password: "testpassword"
  # RabbitMQ authentication secrets
  rabbitmq:
    # Message broker password
    password: "testpassword"
  # OAuth authentication secrets
  oauth:
    # Secret key for OAuth token signing
    secretKey: "test-oauth-secret-key-12345"
  # JWT token secrets
  jwt:
    # Secret key for JWT token signing and verification
    secret: "test-jwt-secret-key-12345"
  # Register service secrets
  register:
    # Encryption key for register data
    encryptionKey: "test-encryption-key-12345"
    # Authentication token for register service
    authToken: "cmVnaXN0ZXI6dGVzdC1hdXRoLXRva2VuLTEyMzQ1"
  # External reader service secrets
  externalReader:
    # Authentication token for external reader service
    authToken: "test-external-reader-token"
  # File storage service secrets
  filestorage:
    # Authentication token for file storage service
    authToken: "test-filestorage-token"
  # Notification service secrets
  notification:
    # Username for notification service authentication
    user: "notification"
    # Password for notification service authentication
    password: "test-notification-password"

# NetworkPolicy configuration
# When enabled, NetworkPolicy resources are created for every service,
# enforcing least-privilege traffic rules by tier:
#   frontend  — ingress from ingress-controller only; egress DNS only
#   backend   — ingress from ingress-controller + intra-namespace Liquio pods;
#               egress DNS + configured infra + optional SMTP/SMS
#   gateway   — ingress from ingress-controller; egress to all backend pods
#   infra     — ingress from any Liquio pod; egress DNS only
#
# NOTE: For FQDN-based egress to external smtp/sms hosts, use
#       CiliumNetworkPolicy in addition to this standard NetworkPolicy.
networkPolicy:
  # Set to false to disable all NetworkPolicy resources (e.g. CNI without NP support)
  enabled: true
  egress:
    postgres:
      # Restrict backend egress to PostgreSQL port
      enabled: true
    redis:
      # Restrict backend egress to Redis port
      enabled: true
    rabbitmq:
      # Restrict backend egress to RabbitMQ port
      enabled: true
    smtp:
      # Allow backend egress to an SMTP relay (port-based, any IP)
      enabled: false
      host: ""
      port: 587
    sms:
      # Allow backend egress to an SMS gateway (port-based, any IP)
      enabled: false
      host: ""
      port: 443
  ingress:
    ingressController:
      # Allow ingress from the ingress-nginx namespace
      enabled: true
      # Override namespace label selector for the ingress-controller namespace.
      # When empty the default label kubernetes.io/metadata.name: ingress-nginx is used.
      namespaceSelector: {}
    prometheus:
      # Allow ingress from a Prometheus scraping namespace
      enabled: false
      # Override namespace label selector for the Prometheus namespace.
      # When empty the default label kubernetes.io/metadata.name: monitoring is used.
      namespaceSelector: {}

# PodDisruptionBudget configuration
# A PDB is only created for a service when BOTH conditions are met:
#   1. podDisruptionBudget.enabled is true
#   2. the service's replicaCount is >= 2
# This prevents accidental disruption of high-availability deployments during
# voluntary events such as node drains and rolling upgrades.
podDisruptionBudget:
  # Set to false to disable all PodDisruptionBudget resources globally
  enabled: true
  # Minimum number of pods that must remain available during voluntary disruptions.
  # Can be an absolute number (e.g. 1) or a percentage string (e.g. "50%").
  minAvailable: 1
  # Policy for evicting unhealthy pods to allow disruptions to proceed.
  # AlwaysAllow: unhealthy pods are always counted as available (allows nodes to drain even if pods are broken).
  # IfHealthyBudget: only allow evicting unhealthy pods when the healthy pod count exceeds minAvailable.
  # Requires Kubernetes >= 1.26. Set to "" to omit this field for older clusters.
  unhealthyPodEvictionPolicy: AlwaysAllow
