apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.fullname" . }}-cabinet-api-config
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
{{ $authBase := dict
  "LiquioId" (dict
    "server" (printf "http://%s-id-api" (include "liquio.fullname" .))
    "port" 80
    "routes" (dict
      "getCode" "/authorise"
      "getToken" "/oauth/token/"
      "getUserInfo" "/user/info"
      "searchUsers" "/user/info/search"
      "getUserByCode" "/user/info/ipn"
      "logout" "/logout"
      "sendSms" "/sign_up/confirmation/phone/send"
      "verifyPhone" "/sign_up/confirmation/phone/verify"
      "changeEmail" "/user/info/email/send"
      "confirmChangeEmail" "/user/info/email/set"
      "addTestCode" "/oauth/token/test_code"
      "ping" "/test/ping"
      "pingWithAuth" "/test/ping_with_auth"
      "prepareUser" "/user/prepare"
    )
    "timeout" 30000
    "clientId" "liquio-portal"
  )
  "authRedirectUrl" (printf "%s://%s/" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "cabinet")))
  "logoutRedirectUrl" (printf "%s://%s/" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "cabinet")))
  "allowedTestAuth" false
  "allowedTestSign" false
  "allowedTestPem" true
  "defaultUnits" (list)
  "doNotLogoutOtherSessions" true
  "caching" (dict
    "isEnabled" false
    "getCheckMiddleware" (dict
      "isEnabled" false
      "ttl" 30
    )
  )
-}}
{{ $dbBase := include "liquio.postgresDbBase" (dict "ctx" . "database" "bpmn" "username" .Values.config.database.username) | fromJson -}}
{{ $_ := set $dbBase "operatorsAliases" false -}}
{{- $serverBase := dict
  "hostname" (default "0.0.0.0" .Values.config.server.hostname)
  "port" (default 8080 .Values.services.cabinetApi.containerPort)
  "maxBodySize" (default "100mb" .Values.config.server.maxBodySize)
  "swagger" true
  "customer" .Release.Name
  "environment" .Values.config.server.environment
-}}
{{- $redisBase := dict
  "isEnabled" true
  "host" (include "liquio.redis.host" .)
  "port" .Values.config.redis.port
  "defaultTtl" 30
-}}
{{- $logBase := dict
  "console" (list)
  "file" (list "./logs/")
  "excludeParams" (list
    "token"
    "authorization"
    "Authorization"
    "oauth-token"
    "secret"
    "password"
    "oldPassword"
    "oldPasswords"
  )
-}}
{{- $discoveryBase := dict
  "customApis" (list)
  "mainProxy" (printf "http://%s-task:80" (include "liquio.fullname" .))
-}}
data:
  # Auth configuration
  auth.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "cabinetApi" "config" "auth.json" "base" $authBase) | nindent 4 }}

  # Database configuration
  db.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "cabinetApi" "config" "db.json" "base" $dbBase) | nindent 4 }}

  # Server configuration
  server.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "cabinetApi" "config" "server.json" "base" $serverBase) | nindent 4 }}

  # Redis configuration
  redis.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "cabinetApi" "config" "redis.json" "base" $redisBase) | nindent 4 }}

  # Logging configuration
  log.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "cabinetApi" "config" "log.json" "base" $logBase) | nindent 4 }}

  # Discovery configuration
  discovery.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "cabinetApi" "config" "discovery.json" "base" $discoveryBase) | nindent 4 }}
