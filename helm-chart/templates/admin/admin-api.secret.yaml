{{- if not .Values.secrets.existingSecretConfig }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "admin-api") }}
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-api
type: Opaque
stringData:
  db.json: |
    { "password": "{{ include "liquio.postgresql.passwordValue" . }}" }
  message_queue.json: |
    { "amqpConnection": "amqp://{{ .Values.config.rabbitmq.username }}:{{ include "liquio.rabbitmq.passwordValue" . }}@{{ include "liquio.rabbitmq.host" . }}:{{ .Values.config.rabbitmq.port }}/" }
  auth.json: |
    { "basicAuthToken": "{{ include "liquio.oauth.secretKeyValue" . }}", "clientSecret": "{{ include "liquio.oauth.secretKeyValue" . }}", "jwtSecret": "{{ include "liquio.jwt.secretValue" . }}" }
  filestorage.json: |
    { "token": "{{ include "liquio.filestorage.authTokenValue" . }}" }
  register.json: |
    { "token": "Basic {{ include "liquio.register.authTokenValue" . }}" }
  server.json: |
    { "crypto": { "iv": "{{ include "liquio.oauth.secretKeyValue" . }}", "password": "{{ include "liquio.jwt.secretValue" . }}" }, "token": "{{ include "liquio.oauth.secretKeyValue" . }}" }
  elastic.json: |
    { "headers": { "Authorization": "Basic {{ include "liquio.oauth.secretKeyValue" . }}" } }
  notifier.json: |
    { "user": "{{ include "liquio.notification.userValue" . }}", "hashedPassword": "{{ include "liquio.notification.passwordValue" . }}" }
  system_notifier.json: |
    { "email": { "user": "{{ include "liquio.notification.userValue" . }}", "hashedPassword": "{{ include "liquio.notification.passwordValue" . }}" } }
  sign.json: |
    { "token": "{{ include "liquio.oauth.secretKeyValue" . }}" }
{{- end }}
