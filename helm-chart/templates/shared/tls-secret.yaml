{{- if .Values.ingress.selfSigned.enabled -}}
{{- $secretName := printf "%s-tls" (include "liquio.fullname" .) -}}
{{- $namespace := include "liquio.namespace" . -}}
{{- $existing := lookup "v1" "Secret" $namespace $secretName -}}
{{- $certData := dict -}}
{{- if $existing -}}
  {{- $certData = $existing.data -}}
{{- else -}}
  {{- $hosts := list -}}
  {{- range .Values.ingress.hosts -}}
    {{- $hosts = append $hosts .host -}}
  {{- end -}}
  {{- $generated := genSelfSignedCert "liquio.local" (list) $hosts 3650 -}}
  {{- $certData = dict "tls.crt" ($generated.Cert | b64enc) "tls.key" ($generated.Key | b64enc) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ index $certData "tls.crt" }}
  tls.key: {{ index $certData "tls.key" }}
{{- end }}
