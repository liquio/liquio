{{- if eq (include "liquio.secrets.create" .) "true" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "liquio.fullname" . }}-init-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "liquio.fullname" . }}-init-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "liquio.fullname" . }}-init-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ include "liquio.fullname" . }}-init-secrets
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "liquio.fullname" . }}-init-secrets
  apiGroup: rbac.authorization.k8s.io
{{- end }}
