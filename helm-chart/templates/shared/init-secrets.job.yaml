{{- if eq (include "liquio.secrets.create" .) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "liquio.fullname" . }}-init-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    ignore-check.kube-linter.io/no-read-only-root-fs: "init-secrets requires filesystem writes for apk add"
    ignore-check.kube-linter.io/run-as-non-root: "init-secrets requires root to run apk add"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "liquio.labels" . | nindent 8 }}
        app.kubernetes.io/component: init-secrets
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "liquio.fullname" . }}-init-secrets
      containers:
        - name: init-secrets
          image: alpine/k8s:1.34.7
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
          command:
            - /bin/sh
            - -ec
            - |
              set -eu

              apk add --no-cache openssl jq >/dev/null

              NAMESPACE={{ .Release.Namespace | quote }}
              TMP_DIR="$(mktemp -d)"
              trap 'rm -rf "$TMP_DIR"' EXIT

              POSTGRES_PASSWORD="$(openssl rand -base64 32)"
              # Use URL-safe password material for AMQP URL embedding.
              RABBITMQ_PASSWORD="$(openssl rand -hex 24)"
              OAUTH_SECRET="$(openssl rand -base64 32)"
              JWT_SECRET="$(openssl rand -base64 32)"
              REGISTER_KEY="$(openssl rand -base64 32)"
              REGISTER_TOKEN="Basic $(printf "register:%s" "$(openssl rand -base64 32)" | base64 | tr -d '\n')"
              READER_PASSWORD="$(openssl rand -base64 32)"
              READER_TOKEN="Basic $(printf "external-reader:%s" "$READER_PASSWORD" | base64 | tr -d '\n')"
              FILESTORAGE_TOKEN="Basic $(printf "filestorage:%s" "$(openssl rand -base64 32)" | base64 | tr -d '\n')"
              NOTIFY_LOGIN="notification"
              NOTIFY_PASSWORD="$(openssl rand -base64 32)"
              NOTIFY_HASH="$(echo -n "$NOTIFY_PASSWORD" | openssl dgst -sha512 -hmac "$NOTIFY_LOGIN" | awk '{print $2}' | tr '[:lower:]' '[:upper:]')"

              kubectl create secret generic {{ printf "%s-infra-secrets" (include "liquio.fullname" .) }} \
                --namespace "$NAMESPACE" \
                --from-literal=postgresql-password="$POSTGRES_PASSWORD" \
                --from-literal=rabbitmq-password="$RABBITMQ_PASSWORD"

              openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout "$TMP_DIR/ca.key" \
                -out "$TMP_DIR/ca.crt" \
                -subj "/C=UA/L=Kyiv/O=Liquio/OU=Development/CN=Liquio"

              kubectl create secret generic {{ .Values.secrets.existingSecrets.caCerts | default (printf "%s-ca-certs" (include "liquio.fullname" .)) }} \
                --namespace "$NAMESPACE" \
                --from-file=ca.crt="$TMP_DIR/ca.crt" \
                --from-file=ca.key="$TMP_DIR/ca.key"

              SIGN_TOOL_X509_JSON="$(jq -cn --rawfile ca "$TMP_DIR/ca.crt" '{caCerts: [$ca]}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "sign-tool") }} \
                --namespace "$NAMESPACE" \
                --from-literal=x509.json="$SIGN_TOOL_X509_JSON"

              RABBITMQ_CONNECTION="amqp://{{ .Values.config.rabbitmq.username }}:$RABBITMQ_PASSWORD@{{ include "liquio.rabbitmq.host" . }}:{{ .Values.config.rabbitmq.port }}/"

              ADMIN_API_DB_JSON="$(jq -cn --arg password "$POSTGRES_PASSWORD" '{password: $password}')"
              ADMIN_API_MQ_JSON="$(jq -cn --arg amqp "$RABBITMQ_CONNECTION" '{amqpConnection: $amqp}')"
              ADMIN_API_AUTH_JSON="$(jq -cn --arg oauth "$OAUTH_SECRET" --arg jwt "$JWT_SECRET" '{basicAuthToken: $oauth, clientSecret: $oauth, jwtSecret: $jwt}')"
              ADMIN_API_FILESTORAGE_JSON="$(jq -cn --arg token "$FILESTORAGE_TOKEN" '{token: $token}')"
              ADMIN_API_REGISTER_JSON="$(jq -cn --arg token "$REGISTER_TOKEN" '{token: $token}')"
              ADMIN_API_SERVER_JSON="$(jq -cn --arg oauth "$OAUTH_SECRET" --arg jwt "$JWT_SECRET" '{crypto: {iv: $oauth, password: $jwt}, token: $oauth}')"
              ADMIN_API_ELASTIC_JSON="$(jq -cn --arg oauth "$OAUTH_SECRET" '{headers: {Authorization: ("Basic " + $oauth)}}')"
              ADMIN_API_NOTIFIER_JSON="$(jq -cn --arg user "$NOTIFY_LOGIN" --arg password "$NOTIFY_PASSWORD" '{user: $user, hashedPassword: $password}')"
              ADMIN_API_SYSTEM_NOTIFIER_JSON="$(jq -cn --arg user "$NOTIFY_LOGIN" --arg password "$NOTIFY_PASSWORD" '{email: {user: $user, hashedPassword: $password}}')"
              ADMIN_API_SIGN_JSON="$(jq -cn --arg oauth "$OAUTH_SECRET" '{token: $oauth}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "admin-api") }} \
                --namespace "$NAMESPACE" \
                --from-literal=db.json="$ADMIN_API_DB_JSON" \
                --from-literal=message_queue.json="$ADMIN_API_MQ_JSON" \
                --from-literal=auth.json="$ADMIN_API_AUTH_JSON" \
                --from-literal=filestorage.json="$ADMIN_API_FILESTORAGE_JSON" \
                --from-literal=register.json="$ADMIN_API_REGISTER_JSON" \
                --from-literal=server.json="$ADMIN_API_SERVER_JSON" \
                --from-literal=elastic.json="$ADMIN_API_ELASTIC_JSON" \
                --from-literal=notifier.json="$ADMIN_API_NOTIFIER_JSON" \
                --from-literal=system_notifier.json="$ADMIN_API_SYSTEM_NOTIFIER_JSON" \
                --from-literal=sign.json="$ADMIN_API_SIGN_JSON"

              CABINET_API_DB_JSON="$(jq -cn --arg password "$POSTGRES_PASSWORD" '{password: $password}')"
              CABINET_API_AUTH_JSON="$(jq -cn --arg oauth "$OAUTH_SECRET" --arg jwt "$JWT_SECRET" '{LiquioId: {clientSecret: $oauth, basicAuthToken: $oauth}, jwtSecret: $jwt}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "cabinet-api") }} \
                --namespace "$NAMESPACE" \
                --from-literal=db.json="$CABINET_API_DB_JSON" \
                --from-literal=auth.json="$CABINET_API_AUTH_JSON"

              ID_CONFIG_JSON="$(jq -cn --arg password "$POSTGRES_PASSWORD" --arg oauth "$OAUTH_SECRET" --arg jwt "$JWT_SECRET" --arg notifyAuth "Basic $NOTIFY_LOGIN:$NOTIFY_PASSWORD" '{production: {db: {password: $password}, session: {secret_key: $oauth}, jwt: {secret: $jwt}, oauth: {secret_key: [$oauth]}, notify: {authorization: $notifyAuth}}}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "id") }} \
                --namespace "$NAMESPACE" \
                --from-literal=config.json="$ID_CONFIG_JSON"

              EVENT_DB_JSON="$(jq -cn --arg password "$POSTGRES_PASSWORD" '{password: $password}')"
              EVENT_MQ_JSON="$(jq -cn --arg amqp "$RABBITMQ_CONNECTION" '{amqpConnection: $amqp}')"
              EVENT_FILESTORAGE_JSON="$(jq -cn --arg token "$FILESTORAGE_TOKEN" '{token: $token}')"
              EVENT_REQUESTER_JSON="$(jq -cn --arg token "$REGISTER_TOKEN" '{registers: {token: $token}}')"
              EVENT_NOTIFIER_JSON="$(jq -cn --arg user "$NOTIFY_LOGIN" --arg password "$NOTIFY_PASSWORD" '{email: {user: $user, hashedPassword: $password}, sms: {user: $user, hashedPassword: $password}}')"
              EVENT_SYSTEM_NOTIFIER_JSON="$(jq -cn --arg user "$NOTIFY_LOGIN" --arg password "$NOTIFY_PASSWORD" '{email: {user: $user, hashedPassword: $password}}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "event") }} \
                --namespace "$NAMESPACE" \
                --from-literal=db.json="$EVENT_DB_JSON" \
                --from-literal=message_queue.json="$EVENT_MQ_JSON" \
                --from-literal=filestorage.json="$EVENT_FILESTORAGE_JSON" \
                --from-literal=requester.json="$EVENT_REQUESTER_JSON" \
                --from-literal=notifier.json="$EVENT_NOTIFIER_JSON" \
                --from-literal=system_notifier.json="$EVENT_SYSTEM_NOTIFIER_JSON"

              EXTERNAL_READER_AUTH_JSON="$(jq -cn --arg token "external-reader:$READER_PASSWORD" '{basicAuthTokens: [$token]}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "external-reader") }} \
                --namespace "$NAMESPACE" \
                --from-literal=auth.json="$EXTERNAL_READER_AUTH_JSON"

              FILESTORAGE_DB_JSON="$(jq -cn --arg password "$POSTGRES_PASSWORD" '{password: $password}')"
              FILESTORAGE_AUTH_JSON="$(jq -cn --arg token "$FILESTORAGE_TOKEN" '{token: $token}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "filestorage") }} \
                --namespace "$NAMESPACE" \
                --from-literal=db.json="$FILESTORAGE_DB_JSON" \
                --from-literal=auth.json="$FILESTORAGE_AUTH_JSON"

              GATEWAY_DB_JSON="$(jq -cn --arg password "$POSTGRES_PASSWORD" '{password: $password}')"
              GATEWAY_MQ_JSON="$(jq -cn --arg amqp "$RABBITMQ_CONNECTION" '{amqpConnection: $amqp}')"
              GATEWAY_SYSTEM_NOTIFIER_JSON="$(jq -cn --arg user "$NOTIFY_LOGIN" --arg password "$NOTIFY_PASSWORD" '{email: {user: $user, hashedPassword: $password}}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "gateway") }} \
                --namespace "$NAMESPACE" \
                --from-literal=db.json="$GATEWAY_DB_JSON" \
                --from-literal=message_queue.json="$GATEWAY_MQ_JSON" \
                --from-literal=system_notifier.json="$GATEWAY_SYSTEM_NOTIFIER_JSON"

              MANAGER_DB_JSON="$(jq -cn --arg password "$POSTGRES_PASSWORD" '{password: $password}')"
              MANAGER_MQ_JSON="$(jq -cn --arg amqp "$RABBITMQ_CONNECTION" '{amqpConnection: $amqp}')"
              MANAGER_SYSTEM_NOTIFIER_JSON="$(jq -cn --arg user "$NOTIFY_LOGIN" --arg password "$NOTIFY_PASSWORD" '{email: {user: $user, hashedPassword: $password}}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "manager") }} \
                --namespace "$NAMESPACE" \
                --from-literal=db.json="$MANAGER_DB_JSON" \
                --from-literal=message_queue.json="$MANAGER_MQ_JSON" \
                --from-literal=system_notifier.json="$MANAGER_SYSTEM_NOTIFIER_JSON"

              NOTIFICATION_CONFIG_JSON="$(jq -cn --arg dbPassword "$POSTGRES_PASSWORD" --arg hashUser "$NOTIFY_HASH" --arg notifyPassword "$NOTIFY_PASSWORD" '{production: {password: $dbPassword, db: {password: $dbPassword}, authorization: {list: [{user: $hashUser, password: $notifyPassword}]}}}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "notification") }} \
                --namespace "$NAMESPACE" \
                --from-literal=config.json="$NOTIFICATION_CONFIG_JSON"

              REGISTER_DB_JSON="$(jq -cn --arg password "$POSTGRES_PASSWORD" '{password: $password}')"
              REGISTER_ENCRYPTION_JSON="$(jq -cn --arg key "$REGISTER_KEY" '{key: $key}')"
              REGISTER_AUTH_JSON="$(jq -cn --arg token "$REGISTER_TOKEN" '{tokens: [$token]}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "register") }} \
                --namespace "$NAMESPACE" \
                --from-literal=db.json="$REGISTER_DB_JSON" \
                --from-literal=encryption.json="$REGISTER_ENCRYPTION_JSON" \
                --from-literal=auth.json="$REGISTER_AUTH_JSON"

              TASK_DB_JSON="$(jq -cn --arg password "$POSTGRES_PASSWORD" '{password: $password}')"
              TASK_MQ_JSON="$(jq -cn --arg amqp "$RABBITMQ_CONNECTION" '{amqpConnection: $amqp}')"
              TASK_AUTH_JSON="$(jq -cn --arg oauth "$OAUTH_SECRET" --arg jwt "$JWT_SECRET" '{LiquioId: {clientSecret: $oauth, basicAuthToken: $oauth}, jwtSecret: $jwt}')"
              TASK_REGISTER_JSON="$(jq -cn --arg token "$REGISTER_TOKEN" '{token: $token}')"
              TASK_EXTERNAL_READER_JSON="$(jq -cn --arg token "$READER_TOKEN" '{basicAuthToken: $token}')"
              TASK_FILESTORAGE_JSON="$(jq -cn --arg token "$FILESTORAGE_TOKEN" '{token: $token}')"
              TASK_STORAGE_JSON="$(jq -cn --arg token "$FILESTORAGE_TOKEN" '{FileStorage: {token: $token}}')"
              TASK_DOWNLOAD_TOKEN_JSON="$(jq -cn --arg jwt "$JWT_SECRET" '{jwtSecret: $jwt}')"
              TASK_NOTIFIER_JSON="$(jq -cn --arg user "$NOTIFY_LOGIN" --arg password "$NOTIFY_PASSWORD" '{user: $user, hashedPassword: $password}')"
              TASK_SYSTEM_NOTIFIER_JSON="$(jq -cn --arg user "$NOTIFY_LOGIN" --arg password "$NOTIFY_PASSWORD" '{email: {user: $user, hashedPassword: $password}}')"

              kubectl create secret generic {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "task") }} \
                --namespace "$NAMESPACE" \
                --from-literal=db.json="$TASK_DB_JSON" \
                --from-literal=message_queue.json="$TASK_MQ_JSON" \
                --from-literal=auth.json="$TASK_AUTH_JSON" \
                --from-literal=register.json="$TASK_REGISTER_JSON" \
                --from-literal=external_reader.json="$TASK_EXTERNAL_READER_JSON" \
                --from-literal=filestorage.json="$TASK_FILESTORAGE_JSON" \
                --from-literal=storage.json="$TASK_STORAGE_JSON" \
                --from-literal=download_token.json="$TASK_DOWNLOAD_TOKEN_JSON" \
                --from-literal=notifier.json="$TASK_NOTIFIER_JSON" \
                --from-literal=system_notifier.json="$TASK_SYSTEM_NOTIFIER_JSON"
{{- end }}
