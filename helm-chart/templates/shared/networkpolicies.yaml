{{- /* ── Frontend services ────────────────────────────────────────── */}}
{{- if .Values.services.idFront.enabled }}
{{- include "liquio.networkPolicy.frontend" (dict "component" "id-front" "context" .) }}
{{- end }}
{{- if .Values.services.adminFront.enabled }}
{{- include "liquio.networkPolicy.frontend" (dict "component" "admin-front" "context" .) }}
{{- end }}
{{- if .Values.services.cabinetFront.enabled }}
{{- include "liquio.networkPolicy.frontend" (dict "component" "cabinet-front" "context" .) }}
{{- end }}

{{- /* ── API gateway ───────────────────────────────────────────────── */}}
{{- if .Values.services.gateway.enabled }}
{{- include "liquio.networkPolicy.gateway" (dict "component" "gateway" "context" .) }}
{{- end }}

{{- /* ── Public backend services ────────────────────────────────────── */}}
{{- if .Values.services.idApi.enabled }}
{{- include "liquio.networkPolicy.backend" (dict "component" "id-api" "context" .) }}
{{- end }}
{{- if .Values.services.adminApi.enabled }}
