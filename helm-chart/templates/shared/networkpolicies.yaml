{{- end }}
{{- if .Values.services.cabinetApi.enabled }}
{{- include "liquio.networkPolicy.backend" (dict "component" "cabinet-api" "context" .) }}
{{- end }}

{{- /* ── Internal backend services ───────────────────────────────────── */}}
{{- if .Values.services.event.enabled }}
{{- include "liquio.networkPolicy.backend" (dict "component" "event" "context" .) }}
{{- end }}
{{- if .Values.services.externalReader.enabled }}
{{- include "liquio.networkPolicy.backend" (dict "component" "external-reader" "context" .) }}
{{- end }}
{{- if .Values.services.filestorage.enabled }}
{{- include "liquio.networkPolicy.backend" (dict "component" "filestorage" "context" .) }}
{{- end }}
{{- if .Values.services.manager.enabled }}
{{- include "liquio.networkPolicy.backend" (dict "component" "manager" "context" .) }}
{{- end }}
{{- if .Values.services.notification.enabled }}
{{- include "liquio.networkPolicy.backend" (dict "component" "notification" "context" .) }}
{{- end }}
{{- if .Values.services.register.enabled }}
{{- include "liquio.networkPolicy.backend" (dict "component" "register" "context" .) }}
{{- end }}
{{- if .Values.services.signTool.enabled }}
