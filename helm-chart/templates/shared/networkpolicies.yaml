{{- end }}
{{- if .Values.services.task.enabled }}
{{- include "liquio.networkPolicy.backend" (dict "component" "task" "context" .) }}
{{- end }}

{{- /* ── Internal infrastructure (only when deployed in-cluster) ────── */}}
{{- if .Values.postgresql.enabled }}
{{- include "liquio.networkPolicy.infra" (dict "component" "postgresql" "context" .) }}
{{- end }}
{{- if .Values.redis.enabled }}
