apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.fullname" . }}-task-config
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
{{ $dbBase := include "liquio.postgresDbBase" (dict "ctx" . "database" "bpmn" "username" .Values.config.database.username) | fromJson -}}
{{ $messageQueueBase := dict
  "amqpConnectionParams" (dict
    "heartbeat" 300
  )
  "maxHandlingMessages" 2
  "readingQueueName" "bpmn-task-incoming"
  "writingQueueName" "bpmn-manager-incoming"
  "enabledReadingGeneratingPdfMessages" true
  "maxHandlingGeneratingPdfMessages" 1
  "retryConnectionTime" 10000
-}}
{{ $authBase := dict
  "LiquioId" (dict
    "server" (printf "http://%s-id-api" (include "liquio.fullname" .))
    "front" (printf "%s://%s" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "id")))
    "port" 80
    "routes" (dict
      "getCode" "/authorise"
      "getToken" "/oauth/token/"
      "getUserInfo" "/user/info"
      "searchUsers" "/user/info/search"
      "getUserByCode" "/user/info/ipn"
      "logout" "/logout"
      "sendSms" "/sign_up/confirmation/phone/send"
      "verifyPhone" "/sign_up/confirmation/phone/verify"
      "changeEmail" "/user/info/email/send"
      "confirmChangeEmail" "/user/info/email/set"
      "addTestCode" "/oauth/token/test_code"
      "ping" "/test/ping"
      "pingWithAuth" "/test/ping_with_auth"
      "prepareUser" "/user/prepare"
    )
    "timeout" 30000
    "clientId" "liquio-portal"
  )
  "authRedirectUrl" (printf "%s://%s/" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "cabinet")))
  "logoutRedirectUrl" (printf "%s://%s/" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "cabinet")))
  "jwtOptions" (dict
    "expiresIn" "1d"
  )
  "allowedTestAuth" false
  "allowedTestSign" false
  "allowedTestPem" true
  "defaultUnits" (list 1000013)
  "doNotLogoutOtherSessions" true
  "caching" (dict
    "isEnabled" false
    "getCheckMiddleware" (dict
      "isEnabled" false
      "ttl" 30
    )
  )
  "ldap" (dict
    "isEnabled" false
    "url" "ldap://domain.loc"
    "baseDN" "dc=DOMAIN,dc=LOC"
    "username" "admin@domain.loc"
    "password" "<removed>"
  )
-}}
{{ $registerBase := dict
  "server" (printf "http://%s-register" (include "liquio.fullname" .))
  "port" 80
  "limit" 10000
  "accessCacheLifetime" 60000
  "registerKeysForAddresses" (list)
  "strictAccess" (dict
    "keys" (list)
  )
  "access" (list
    (dict
      "unit" 1
      "allowSeeAllRecords" true
      "keys" (dict
        "allowRead" (list)
        "allowCreate" (list)
        "allowUpdate" (list)
        "allowDelete" (list)
        "allowHistory" (list)
      )
    )
  )
  "timeout" 30000
-}}
{{ $externalReaderBase := dict
  "url" (printf "http://%s-external-reader:80" (include "liquio.fullname" .))
  "timeout" 30000
-}}
{{ $filestorageBase := dict
  "apiHost" (printf "http://%s-filestorage:80" (include "liquio.fullname" .))
  "containerId" 1
  "signatureTimeout" 40000
  "downloadUploadTimeout" 60000
  "timeout" 10000
-}}
{{ $storageBase := dict
  "OpenStack" (dict
    "server" (printf "%s://%s" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "storage")))
    "port" 5000
    "routes" (dict
      "getTokens" "/v2.0/tokens"
    )
    "timeout" 30000
    "tenantName" "liquio"
    "admin" (dict
      "login" "liquio"
      "password" "<removed>"
    )
    "user" (dict
      "login" "liquio"
      "password" "<removed>"
    )
    "container" "liquio"
    "isFilesCanBeDeleted" false
  )
  "FileStorage" (dict
    "apiHost" (printf "http://%s-filestorage:80" (include "liquio.fullname" .))
    "containerId" 1
  )
-}}
{{ $serverBase := dict
  "hostname" (default "0.0.0.0" .Values.config.server.hostname)
  "port" (default 8080 .Values.services.task.containerPort)
  "maxBodySize" (default "100mb" .Values.config.server.maxBodySize)
  "serverName" (printf "http://%s-task:80" (include "liquio.fullname" .))
  "customer" .Release.Name
  "environment" .Values.config.server.environment
-}}
{{ $redisBase := dict
  "host" (include "liquio.redis.host" .)
  "port" .Values.config.redis.port
  "options" (dict)
-}}
{{ $logBase := dict
  "isFullLogsEnabled" false
  "console" (list)
  "file" (list "./logs/")
  "skipLoggingRoutesList" (list
    (dict
      "comment" "Skip dictionaries list."
      "pattern" "^/dictionaries$"
    )
    (dict
      "comment" "Skip documents."
      "pattern" "^/registers/keys/.{1,}/records_tree$"
    )
  )
  "responsesData" false
  "stackTrace" false
  "excludeParams" (list
    "token"
    "access_token"
    "refresh_token"
    "oauth-token"
    "authorization"
    "Authorization"
    "secret"
    "password"
    "oldPassword"
    "oldPasswords"
    "client_secret"
    "_token="
    "client_id="
    "client_secret="
  )
-}}
{{ $accessBase := dict
  "usersIpnToIpList" (dict
    "19999999999" (list "office")
  )
  "allowableUnits" (list)
  "routeGroupsExceptions" (list "public" "auth" "user" "message")
-}}
{{ $adminBase := dict
  "swagger" false
  "adminUnitId" (list 1000001 1000000041)
-}}
{{ $basicAuthBase := dict
  "tokens" (list "Basic dGFzazp0YXNr")
  "protectedRoutes" (list
    (dict
      "route" "/some/protected-route"
      "basicAuthUsers" (list "external-reader")
    )
  )
-}}
{{ $cacheBase := dict
  "unit" (dict
    "ttl" 60
  )
  "unitAccess" (dict
    "getAllWithCache" 300
  )
  "documentTemplate" (dict
    "findById" 300
    "substituteJsonProps" 300
  )
  "eventTemplate" (dict
    "findById" 300
    "findByIds" 300
  )
  "gatewayTemplate" (dict
    "findById" 300
  )
  "numberTemplate" (dict
    "findById" 300
  )
  "taskTemplate" (dict
    "findById" 300
    "getAll" 300
  )
  "workflowTemplateCategory" (dict
    "getAll" 300
  )
  "workflowTemplate" (dict
    "findById" 300
    "getAll" 300
  )
-}}
{{ $customLogsBase := dict
  "templatesCacheLifetime" 60000
  "cacheEnabled" false
  "redis" (dict
    "ttl" 60
  )
-}}
{{ $downloadTokenBase := dict
  "lifetimeInSeconds" 3600
-}}
{{ $edsBase := dict
  "providerName" "pkcs7"
  "pkcs7" (dict
    "timeout" 30000
    "signToolUrl" (printf "http://%s-sign-tool:80" (include "liquio.fullname" .))
  )
  "timeout" 30000
-}}
{{ $fileGeneratorBase := dict
  "timeout" "120000"
  "htmlTemplateDelimiter" "<pdf-delimiter>"
  "htmlTemplateDelimiterEnd" "</pdf-delimiter>"
  "variables" (dict
    "publicUrl" "http://localhost:8081"
  )
  "persons" (dict
    "allContentKey" "all"
    "keyTextPrefix" "<b>"
    "keyTextSuffix" "</b>"
    "keysSeparator" "<br /><br />"
    "keyAndSubkeysSeparator" "<br />"
    "subkeysSeparator" "<br />"
    "keys" (list)
    "subkeys" (list)
  )
-}}
{{ $pdfGeneratorBase := dict
  "url" (printf "http://%s-pdf-generator:80/pdf" (include "liquio.fullname" .))
  "basicAuthToken" "Basic <REDACTED>"
  "requestTimeout" 120000
-}}
{{ $mappingBase := dict
  "taskBusiness" (dict
    "frontUrl" (dict
      "template" "{{`{{frontUrl}}`}}"
      "replace" (printf "https://%s" (include "liquio.publicHost" (dict "ctx" . "service" "cabinet")))
    )
  )
-}}
{{ $modelBase := dict
  "pagination" (dict
    "limitPerPage" 50
  )
-}}
{{ $modulesBase := dict
  "main" (dict
    "observerUnits" false
  )
  "externalReader" (dict)
-}}
{{ $notifierBase := dict
  "server" (printf "http://%s-notification" (include "liquio.fullname" .))
  "port" 80
  "timeout" 30000
  "clientId" ""
  "routes" (dict
    "ping" "/test/ping"
    "sendToUserList" "/message/usersList"
    "sendToUserEmails" "/message/emailsList"
  )
-}}
{{ $onboardingBase := dict
  "onboardingTemplate" (dict
    "workflowTemplateId" nil
    "taskTemplateId" nil
  )
-}}
{{ $persistLinkBase := dict
  "server" (printf "%s://%s" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "plink")))
  "port" 443
  "routes" (dict
    "generateQr" "/link?qr=svg"
    "ping" "/test/ping"
    "pingWithAuth" "/test/ping_with_auth"
  )
  "token" "<removed>"
  "serverName" "bpmn_dev"
  "getLinkToFilestorageTimeout" 30000
  "qrFrontUrl" (printf "%s://%s" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "qr")))
-}}
{{ $signBase := dict
  "timeout" 10000
  "url" (printf "http://%s-sign-tool:80" (include "liquio.fullname" .))
  "token" ""
-}}
{{ $systemNotifierBase := dict
  "adminUrl" (printf "%s://%s" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "admin")))
  "email" (dict
    "server" (printf "http://%s-notification" (include "liquio.fullname" .))
    "port" 80
    "routes" (dict
      "sendEmail" "/message/emailsList"
      "sendToUser" "/message/usersList"
      "ping" "/test/ping"
    )
    "timeout" 30000
    "emails" (list)
    "subject" "Workflow process problem."
    "body" "<html><body>An error occurred in process {url}<br/>Task {taskTemplateId} {taskTemplateName}<br/>{error}</body></html>"
  )
-}}
{{ $systemTaskBase := dict
  "isAllowedCreateByOtherSystems" true
  "allowedToCreateByTokens" (list "Basic <removed>")
  "allowedToUpdateDocumentAndCommit" (list "Basic <removed>")
  "tasksTemplateIds" (list "31009003")
-}}
{{ $documentsBase := dict
  "allowedFileExtensions" (list
    ".PDF"
    ".DOC"
    ".DOCX"
    ".XLS"
    ".XLSX"
    ".CSV"
    ".TXT"
    ".RTF"
    ".ODT"
    ".ODS"
    ".PPT"
    ".PPTX"
    ".PNG"
    ".JPG"
    ".JPEG"
    ".GIF"
    ".BMP"
    ".SVG"
    ".WEBP"
    ".TIFF"
    ".ZIP"
    ".RAR"
    ".7Z"
    ".TAR"
    ".GZ"
    ".XML"
    ".JSON"
    ".HTML"
    ".HTM"
    ".CSS"
    ".JS"
    ".MD"
    ".P7S"
    ".P7M"
    ".ASC"
    ".SIG"
    ".EML"
    ".MSG"
    ".MP4"
    ".AVI"
    ".MOV"
    ".WMV"
    ".FLV"
    ".MP3"
    ".WAV"
    ".OGG"
    ".DAT"
    ".LOG"
    ".BAK"
    ".TMP"
  )
-}}
{{ $taskFinishBase := dict
  "addTaskCommiterAsPerformer" true
-}}
{{ $versionsBase := dict
  "services" (list
    (dict "name" "id" "minVersion" "0.7.7")
    (dict "name" "eds" "minVersion" "1.0.11")
    (dict "name" "event" "minVersion" "1.37.6")
    (dict "name" "manager" "minVersion" "1.10.16")
    (dict "name" "gateway" "minVersion" "1.3.13")
    (dict "name" "workflow" "minVersion" "0.0.0")
    (dict "name" "register" "minVersion" "1.41.0")
    (dict "name" "filestorage" "minVersion" "2.3.2")
    (dict "name" "pwgen" "minVersion" "0.0.5")
    (dict "name" "plink" "minVersion" "1.0.5")
    (dict "name" "externalReader" "minVersion" "1.2.66")
    (dict "name" "notify" "minVersion" "1.3.52")
  )
-}}
data:
  # Database configuration
  db.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "db.json" "base" $dbBase) | nindent 4 }}

  # Message queue configuration
  message_queue.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "message_queue.json" "base" $messageQueueBase) | nindent 4 }}

  # Auth configuration
  auth.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "auth.json" "base" $authBase) | nindent 4 }}

  # Register configuration
  register.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "register.json" "base" $registerBase) | nindent 4 }}

  # External reader configuration
  external_reader.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "external_reader.json" "base" $externalReaderBase) | nindent 4 }}

  # Filestorage configuration
  filestorage.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "filestorage.json" "base" $filestorageBase) | nindent 4 }}

  # Storage configuration
  storage.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "storage.json" "base" $storageBase) | nindent 4 }}

  # Server configuration
  server.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "server.json" "base" $serverBase) | nindent 4 }}

  # Redis configuration
  redis.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "redis.json" "base" $redisBase) | nindent 4 }}

  # Logging configuration
  log.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "log.json" "base" $logBase) | nindent 4 }}

  # Access configuration
  access.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "access.json" "base" $accessBase) | nindent 4 }}

  # Admin configuration
  admin.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "admin.json" "base" $adminBase) | nindent 4 }}

  # Basic auth configuration
  basic_auth.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "basic_auth.json" "base" $basicAuthBase) | nindent 4 }}

  # Cache configuration
  cache.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "cache.json" "base" $cacheBase) | nindent 4 }}

  # Custom logs configuration
  custom_logs.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "custom_logs.json" "base" $customLogsBase) | nindent 4 }}

  # Download token configuration
  download_token.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "download_token.json" "base" $downloadTokenBase) | nindent 4 }}

  # EDS configuration
  eds.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "eds.json" "base" $edsBase) | nindent 4 }}

  # File generator configuration
  file_generator.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "file_generator.json" "base" $fileGeneratorBase) | nindent 4 }}

  # PDF generator configuration
  pdf_generator.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "pdf_generator.json" "base" $pdfGeneratorBase) | nindent 4 }}

  # Mapping configuration
  mapping.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "mapping.json" "base" $mappingBase) | nindent 4 }}

  # Model configuration
  model.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "model.json" "base" $modelBase) | nindent 4 }}

  # Modules configuration
  modules.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "modules.json" "base" $modulesBase) | nindent 4 }}

  # Notifier configuration
  notifier.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "notifier.json" "base" $notifierBase) | nindent 4 }}

  # Onboarding configuration
  onboarding.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "onboarding.json" "base" $onboardingBase) | nindent 4 }}

  # Persist link configuration
  persist_link.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "persist_link.json" "base" $persistLinkBase) | nindent 4 }}

  # Sign configuration
  sign.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "sign.json" "base" $signBase) | nindent 4 }}

  # System notifier configuration
  system_notifier.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "system_notifier.json" "base" $systemNotifierBase) | nindent 4 }}

  # System task configuration
  system_task.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "system_task.json" "base" $systemTaskBase) | nindent 4 }}

  # Documents configuration
  documents.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "documents.json" "base" $documentsBase) | nindent 4 }}

  # Task finish configuration
  task_finish.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "task_finish.json" "base" $taskFinishBase) | nindent 4 }}

  # Versions configuration
  versions.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "task" "config" "versions.json" "base" $versionsBase) | nindent 4 }}
