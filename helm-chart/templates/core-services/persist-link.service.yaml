{{- if .Values.services.persistLink.enabled }}
apiVersion: v1
kind: Service
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.fullname" . }}-persist-link
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
    app.kubernetes.io/component: persist-link
spec:
  type: {{ .Values.services.persistLink.type | default "ClusterIP" }}
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "liquio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: persist-link
{{- end }}
