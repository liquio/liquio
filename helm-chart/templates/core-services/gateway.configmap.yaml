apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.fullname" . }}-gateway-config
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
{{ $dbBase := include "liquio.postgresDbBase" (dict "ctx" . "database" "bpmn" "username" .Values.config.database.username) | fromJson -}}
{{ $serverBase := dict
  "hostname" (default "0.0.0.0" .Values.config.server.hostname)
  "port" .Values.services.gateway.port
  "maxBodySize" (default "100mb" .Values.config.server.maxBodySize)
  "customer" .Release.Name
  "environment" .Values.config.server.environment
-}}
{{ $messageQueueBase := dict }}
{{ $redisBase := dict
  "hostname" (include "liquio.redis.host" .)
  "port" .Values.config.redis.port
  "db" 0
-}}
{{ $logBase := dict
  "console" (list)
  "file" (list "./logs/")
  "excludeParams" (list "token" "Authorization" "authorization")
-}}
{{ $pingBase := dict
  "enabled" true
-}}
{{ $systemNotifierBase := dict
  "adminUrl" (printf "https://admin.%s" .Values.global.domain)
  "email" (dict
    "server" (printf "http://%s-notification" (include "liquio.fullname" .))
    "port" .Values.services.notification.port
    "routes" (dict
      "sendEmail" "/message/emailsList"
      "sendToUser" "/message/usersList"
      "ping" "/test/ping"
    )
    "timeout" 30000
    "user" "<removed>"
    "emails" (list)
    "subject" "Workflow process problem."
    "body" "<html><body>An error occurred in process {url}<br/>Gateway {gatewayTemplateId} {gatewayTemplateName}<br/>{error}</body></html>"
  )
-}}
{{ $versionsBase := dict
  "api" "1.0.0"
-}}
{{ $logsBroadcastingBase := dict
  "isEnabled" false
  "port" 5000
-}}
data:
  # Database configuration
  db.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "gateway" "config" "db.json" "base" $dbBase) | nindent 4 }}

  # Server configuration
  server.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "gateway" "config" "server.json" "base" $serverBase) | nindent 4 }}

  # Message queue configuration
  message_queue.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "gateway" "config" "message_queue.json" "base" $messageQueueBase) | nindent 4 }}

  # Redis configuration
  redis.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "gateway" "config" "redis.json" "base" $redisBase) | nindent 4 }}

  # Logging configuration
  log.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "gateway" "config" "log.json" "base" $logBase) | nindent 4 }}

  # Ping configuration
  ping.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "gateway" "config" "ping.json" "base" $pingBase) | nindent 4 }}

  # System notifier configuration
  system_notifier.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "gateway" "config" "system_notifier.json" "base" $systemNotifierBase) | nindent 4 }}

  # Versions configuration
  versions.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "gateway" "config" "versions.json" "base" $versionsBase) | nindent 4 }}

  # Logs broadcasting configuration
  logs_broadcasting.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "gateway" "config" "logs_broadcasting.json" "base" $logsBroadcastingBase) | nindent 4 }}
