apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.fullname" . }}-event-config
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
{{ $dbBase := include "liquio.postgresDbBase" (dict "ctx" . "database" "bpmn" "username" .Values.config.database.username) | fromJson -}}
{{ $messageQueueBase := dict
  "maxHandlingMessages" 2
  "readingQueueName" "bpmn-event-incoming"
  "writingQueueName" "bpmn-manager-incoming"
  "retryConnectionTime" 10000
-}}
{{ $filestorageBase := dict
  "apiHost" (printf "http://%s-filestorage:80" (include "liquio.fullname" .))
  "containerId" 1
  "getFileTimeout" 60000
  "downloadFileTimeout" 60000
  "getSetSignatureTimeout" 40000
  "createAsicTimeout" 60000
-}}
{{ $serverBase := dict
  "hostname" (default "0.0.0.0" .Values.config.server.hostname)
  "port" (default 8080 .Values.services.event.containerPort)
  "maxBodySize" (default "100mb" .Values.config.server.maxBodySize)
  "customer" .Release.Name
  "environment" .Values.config.server.environment
-}}
{{ $redisBase := dict
  "host" (include "liquio.redis.host" .)
  "port" .Values.config.redis.port
  "options" (dict)
-}}
{{ $logBase := dict
  "console" (list)
  "file" (list "./logs/")
  "excludeParams" (list
    "token"
    "access_token"
    "refresh_token"
    "oauth-token"
    "authorization"
    "Authorization"
    "secret"
    "password"
    "oldPassword"
    "oldPasswords"
    "client_secret"
    "_token="
    "client_id="
    "client_secret="
  )
-}}
{{ $appBase := dict
  "enabledReadMessageQueueMode" true
  "enabledRunDaemonMode" true
-}}
{{ $pingBase := dict
  "manager" (dict
    "url" (printf "http://%s-manager/test/ping" (include "liquio.fullname" .))
  )
  "healthz" (dict
    "db" (dict
      "enabled" true
    )
  )
  "trembita" (dict
    "url" "http://trembita-host/wsdl"
  )
-}}
{{ $notifierBase := dict
  "email" (dict
    "provider" "liquio"
    "server" (printf "http://%s-notification" (include "liquio.fullname" .))
    "port" 80
    "routes" (dict
      "sendSms" "/message/phonesList"
      "sendEmail" "/message/emailsList"
      "sendToUser" "/message/usersList"
      "hideImportantMessage" "/message/important/<message-id>/set-unimportant"
      "getMessagesList" "/message"
      "ping" "/test/ping"
    )
    "timeout" 30000
    "user" "admin"
    "templateParams" (dict
      "frontUrl" "http://localhost:3000"
    )
    "defaultTemplateId" 1
    "clientId" ""
  )
  "sms" (dict
    "provider" "liquio"
    "server" (printf "http://%s-notification" (include "liquio.fullname" .))
    "port" 80
    "routes" (dict
      "sendSms" "/message/phonesList"
      "ping" "/test/ping"
    )
    "user" "admin"
    "templateParams" (dict
      "frontUrl" "http://localhost:3000"
    )
  )
  "digest" (dict
    "provider" "mailerlite"
    "apiKey" "test-key"
    "groupId" "test-group"
    "routes" (dict
      "getStats" "/api/v2/stats"
      "addSubscribersToGroup" "/api/v2/groups/{{`{{groupId}}`}}/subscribers/import"
    )
    "serviceUrl" "https://api.mailerlite.com"
    "timeout" 30000
  )
-}}
{{ $signBase := dict
  "timeout" 10000
  "url" (printf "http://%s-sign-tool:80" (include "liquio.fullname" .))
  "token" ""
-}}
{{ $userBase := dict
  "LiquioId" (dict
    "server" (printf "http://%s-id-api" (include "liquio.fullname" .))
    "port" 80
    "timeout" 30000
    "clientId" "test-client"
    "clientSecret" "test-secret"
    "basicAuthToken" "test-token"
  )
  "searchUsersLimit" 10
-}}
{{ $versionsBase := dict
  "services" (list
    (dict "name" "id" "minVersion" "0.0.0")
    (dict "name" "eds" "minVersion" "0.0.0")
    (dict "name" "event" "minVersion" "0.0.0")
    (dict "name" "manager" "minVersion" "1.15.0")
    (dict "name" "gateway" "minVersion" "0.0.0")
    (dict "name" "workflow" "minVersion" "0.0.0")
    (dict "name" "register" "minVersion" "0.0.0")
    (dict "name" "filestorage" "minVersion" "0.0.0")
    (dict "name" "pwgen" "minVersion" "0.0.0")
    (dict "name" "plink" "minVersion" "0.0.0")
    (dict "name" "externalReader" "minVersion" "0.0.0")
    (dict "name" "notify" "minVersion" "1.3.41")
  )
-}}
{{ $customBase := dict
  "workflowExtraPermissions" (dict
    "allowUpdateFromAnotherWorkflow" (list)
  )
-}}
{{ $customLogsBase := dict
  "templatesCacheLifetime" 60000
  "cacheEnabled" false
  "redis" (dict
    "ttl" 60
  )
-}}
{{ $delayerBase := dict
  "interval" 60
-}}
{{ $externalBpmnBase := dict
  "test" (dict
    "url" (printf "http://%s-task" (include "liquio.fullname" .))
    "token" "Basic test-token"
    "requestTimeout" 30000
  )
-}}
{{ $httpClientBase := dict
  "requestTimeout" 60000
-}}
{{ $logsBroadcastingBase := dict
  "isEnabled" false
  "port" 5000
-}}
{{ $persistLinkBase := dict
  "server" (printf "http://%s-persist-link:80" (include "liquio.fullname" .))
  "port" 80
  "routes" (dict
    "generateQr" "/link?qr=svg"
    "ping" "/test/ping"
    "pingWithAuth" "/test/ping_with_auth"
  )
  "token" "test-token"
  "serverName" "bpmn_dev"
  "getLinkToFilestorageTimeout" 30000
-}}
{{ $requesterBase := dict
  "blockchain" (dict
    "provider" "liquio"
    "server" (printf "%s://%s" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "blockchain-node")))
    "port" 3003
    "routes" (dict
      "documentsCRUD" "/api/documents"
      "documentsRevoke" "/api/documents/revoke"
    )
    "user" "test-user"
    "hashedPassword" "test-password"
  )
  "registers" (dict
    "provider" "liquio"
    "url" (printf "http://%s-register" (include "liquio.fullname" .))
    "timeout" 20000
  )
  "externalService" (dict
    "trembita" (dict
      "trembitaUrl" (printf "%s://%s" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "trembita-client")))
      "trembitaHeader" (dict
        "client" (dict
          "objectType" "SUBSYSTEM"
          "xRoadInstance" "INSTANCE"
          "memberClass" "CLASS"
          "memberCode" "CODE"
          "subsystemCode" "SUBSYSTEM"
        )
        "service" (dict
          "objectType" "SERVICE"
          "xRoadInstance" "INSTANCE"
          "memberClass" "CLASS"
          "memberCode" "CODE"
          "subsystemCode" "SUBSYSTEM"
          "serviceCode" "SERVICE_CODE"
          "serviceVersion" "?"
        )
        "userId" "?"
        "id" "20191217-1128-01"
        "protocolVersion" "4.0"
      )
      "timeout" 20000
      "debug" false
      "claims" (dict
        "birthCertDuplicate" (dict
          "memberClass" "CLASS"
          "memberCode" "CODE"
          "subsystemCode" "SUBSYSTEM"
          "serviceCode" "SERVICE_CODE"
          "serviceVersion" "?"
        )
      )
    )
    "standard" (dict
      "providersConfigPath" ""
    )
    "standardTrembita" (dict
      "providersConfigPath" ""
    )
  )
-}}
{{ $stopperBase := dict }}
{{ $systemNotifierBase := dict
  "adminUrl" (printf "%s://%s" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "admin")))
  "email" (dict
    "server" (printf "http://%s-notification" (include "liquio.fullname" .))
    "port" 80
    "routes" (dict
      "sendEmail" "/message/emailsList"
      "sendToUser" "/message/usersList"
      "ping" "/test/ping"
    )
    "timeout" 30000
    "user" "test-user"
    "emails" (list)
    "subject" "Workflow process problem."
    "body" "<html><body>An error occurred in process {url}<br/>Event {eventTemplateId} {eventTemplateName}<br/>{error}</body></html>"
  )
  "maxLoops" 50
-}}
{{ $trembitaBase := dict
  "host" (printf "%s://%s" (include "liquio.scheme" .) (include "liquio.publicHost" (dict "ctx" . "service" "trembita")))
  "client" (dict
    "xRoadInstance" "INSTANCE"
    "memberClass" "CLASS"
    "memberCode" "CODE"
    "subsystemCode" "SUBSYSTEM"
  )
  "id" "?"
  "protocolVersion" "4.0"
  "userId" "?"
-}}
{{ $emailBase := dict
  "provider" "liquio"
  "server" (printf "http://%s-notification" (include "liquio.fullname" .))
  "port" 80
  "routes" (dict
    "sendSms" "/message/phonesList"
    "sendEmail" "/message/emailsList"
    "sendToUser" "/message/usersList"
    "hideImportantMessage" "/message/important/<message-id>/set-unimportant"
    "getMessagesList" "/message"
    "ping" "/test/ping"
  )
  "timeout" 30000
  "user" "admin"
  "hashedPassword" "password"
  "templateParams" (dict
    "frontUrl" "http://localhost:3000"
  )
  "defaultTemplateId" 1
  "clientId" ""
-}}
data:
  # Database configuration
  db.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "db.json" "base" $dbBase) | nindent 4 }}

  # Message queue configuration
  message_queue.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "message_queue.json" "base" $messageQueueBase) | nindent 4 }}

  # Filestorage configuration
  filestorage.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "filestorage.json" "base" $filestorageBase) | nindent 4 }}

  # Server configuration
  server.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "server.json" "base" $serverBase) | nindent 4 }}

  # Redis configuration
  redis.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "redis.json" "base" $redisBase) | nindent 4 }}

  # Logging configuration
  log.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "log.json" "base" $logBase) | nindent 4 }}

  # App configuration
  app.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "app.json" "base" $appBase) | nindent 4 }}

  # Ping configuration
  ping.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "ping.json" "base" $pingBase) | nindent 4 }}

  # Notifier configuration
  notifier.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "notifier.json" "base" $notifierBase) | nindent 4 }}

  # Sign configuration
  sign.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "sign.json" "base" $signBase) | nindent 4 }}

  # User configuration
  user.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "user.json" "base" $userBase) | nindent 4 }}

  # Versions configuration
  versions.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "versions.json" "base" $versionsBase) | nindent 4 }}

  # Additional configurations with defaults
  custom.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "custom.json" "base" $customBase) | nindent 4 }}

  custom_logs.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "custom_logs.json" "base" $customLogsBase) | nindent 4 }}

  delayer.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "delayer.json" "base" $delayerBase) | nindent 4 }}

  external_bpmn.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "external_bpmn.json" "base" $externalBpmnBase) | nindent 4 }}

  http_client.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "http_client.json" "base" $httpClientBase) | nindent 4 }}

  logs_broadcasting.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "logs_broadcasting.json" "base" $logsBroadcastingBase) | nindent 4 }}

  persist_link.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "persist_link.json" "base" $persistLinkBase) | nindent 4 }}

  requester.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "requester.json" "base" $requesterBase) | nindent 4 }}

  stopper.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "stopper.json" "base" $stopperBase) | nindent 4 }}

  system_notifier.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "system_notifier.json" "base" $systemNotifierBase) | nindent 4 }}

  trembita.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "trembita.json" "base" $trembitaBase) | nindent 4 }}

  # Email configuration
  email.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "event" "config" "email.json" "base" $emailBase) | nindent 4 }}
