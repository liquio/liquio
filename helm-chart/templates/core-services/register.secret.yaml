{{- if not .Values.secrets.existingSecretConfig }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.secretConfig.name" (dict "ctx" . "service" "register") }}
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
    app.kubernetes.io/component: register
type: Opaque
stringData:
  db.json: |
    { "password": "{{ include "liquio.postgresql.passwordValue" . }}" }
  encryption.json: |
    { "key": "{{ include "liquio.register.encryptionKeyValue" . }}" }
  auth.json: |
    { "tokens": ["Basic {{ include "liquio.register.authTokenValue" . }}"] }
{{- end }}
