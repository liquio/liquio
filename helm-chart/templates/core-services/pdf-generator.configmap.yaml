apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.fullname" . }}-pdf-generator-config
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
{{ $serverBase := dict
  "port" (default 8080 .Values.services.pdfGenerator.containerPort)
  "bodyLimit" "50mb"
}}
{{ $playwrightBase := dict
  "workerTimeout" 30000
  "maxWorkers" 5
  "maxConcurrentJobs" 200
}}
data:
  # Server configuration
  server.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "pdfGenerator" "config" "server.json" "base" $serverBase) | nindent 4 }}

  # Playwright worker configuration
  playwright.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "pdfGenerator" "config" "playwright.json" "base" $playwrightBase) | nindent 4 }}
