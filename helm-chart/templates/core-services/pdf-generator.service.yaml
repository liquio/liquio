{{- if .Values.services.pdfGenerator.enabled }}
apiVersion: v1
kind: Service
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.fullname" . }}-pdf-generator
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-generator
spec:
  type: {{ .Values.services.pdfGenerator.type }}
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "liquio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-generator
{{- end }}
