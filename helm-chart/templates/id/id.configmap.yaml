apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "liquio.namespace" . }}
  name: {{ include "liquio.fullname" . }}-id-config
  labels:
    {{- include "liquio.labels" . | nindent 4 }}
{{ $dbBase := mergeOverwrite
  (include "liquio.postgresDbBase" (dict "ctx" . "database" "id" "username" .Values.config.database.username) | fromJson)
  (dict "pool" (dict "acquire" 60000 "idle" 30000 "max" 5 "min" 0))
-}}
{{ $oauthBase := dict
  "accessTokenLifetimeInSeconds" 28800
  "refreshTokenLifetimeInSeconds" 57600
  "secret_key" (list)
  "defaults" (dict
    "client_id" "liquio-portal"
    "client_name" "Liquio Portal"
    "need_scope_approve" false
    "redirect_uri" (list
      (printf "%s://cabinet.%s/" (include "liquio.scheme" .) .Values.global.domain)
      (printf "%s://admin.%s/" (include "liquio.scheme" .) .Values.global.domain)
    )
    "scope_fields" (list
      "userId" "email" "password" "provider" "gender" "valid" "phone" "status"
      "avaUrl" "birthday" "middle_name" "last_name" "first_name" "services" "ipn"
      "role" "useTwoFactorAuth" "edrpou" "companyName" "isLegal"
      "isIndividualEntrepreneur" "passport_series" "passport_number"
      "passport_issue_date" "passport_issued_by" "id_card_number"
      "id_card_issue_date" "id_card_issued_by" "id_card_expiry_date"
      "onboardingTaskId" "needOnboarding" "address" "addressStruct"
      "isActive" "is_private_house"
    )
    "state" "profile"
  )
-}}
{{ $authProvidersBase := dict
  "eds" (dict
    "authorizationURL" "https://auth.js.sign.eu.iit.com.ua/"
    "blacklistAcsk" (list "test.gov.ua" "test.gov.ua" "test.com.ua")
    "caServerList" "https://iit.com.ua/download/productfiles/CAs.json"
    "callbackURL" (printf "%s://id.%s/authorise/eds/callback" (include "liquio.scheme" .) .Values.global.domain)
    "clientID" "U0000656581"
    "clientSecret" "294c5b4cbeb537ab04c8111f6fa86aa6b29e5f15de521b556cda61ef505f6249"
    "customerURL" "https://auth.js.sign.eu.iit.com.ua/get-user-info"
    "passReqToCallback" "true"
    "showServerList" true
    "tokenURL" "https://auth.js.sign.eu.iit.com.ua/get-access-token"
  )
  "local" (dict "isEnabled" true)
  "x509" (dict "isEnabled" true)
-}}
{{ $x509Base := dict
  "caCerts" (list "-----BEGIN CERTIFICATE-----\\nMIIDXzCCAkegAwIBAgIUC5/U/DSHdXbQPiCulgXQ30SIyT8wDQYJKoZIhvcNAQEL\\nBQAwPzELMAkGA1UEBhMCVUExFzAVBgNVBAoMDkxpcXVpbyBUZXN0IENBMRcwFQYD\\nVQQDDA5MaXF1aW8gVGVzdCBDQTAeFw0yNTA3MTgwOTU3MjRaFw0zNTA3MTYwOTU3\\nMjRaMD8xCzAJBgNVBAYTAlVBMRcwFQYDVQQKDA5MaXF1aW8gVGVzdCBDQTEXMBUG\\nA1UEAwwOTGlxdWlvIFRlc3QgQ0EwggEiMA0GCSqGSIb3DQEBAQUAA4IBDwAwggEK\\nAoIBAQDrNbtEdHyWqUoM5CsQO+V6GTi2J3ZflphbLqe8PrEK2ZrrOqQ2ioYJonMm\\nqvqC2FOqZotefiCFlZlxGNTQL+KBSL5GCW+QdHZ9Xqs6SH+Rv/O59Lysk82MxsyxZhH1\\nE4uohPyKk9AuTHPJnckYqyGIM67h+yOWqkbTo+KbZYkkyo+8zbhhDCQ4YE6fkF/2vQDG\\n9XwzlPmyIPrs5ObnBE38pvHYbRK2tKOQQn0X+0PFOyW8kOE5pfvMUnMEV+bhDM1XDasE\\\\n-----END CERTIFICATE-----")
  "externalUrl" (printf "http://%s-sign-tool:3004" (include "liquio.fullname" .))
-}}
{{ $idProductionBase := dict
  "auth_providers" $authProvidersBase
  "confirmCodeEmailChangeHeader" "Email Confirmation"
  "confirmCodeEmailHeader" "Registration Confirmation"
  "confirmCodeEmailTemplate" (include "liquio.id-confirmCodeEmailTemplate" nil)
  "confirmCodeRetries" 10
  "customer" .Release.Name
  "db" $dbBase
  "domain" ".internal"
  "enabledDeleteUser" false
  "environment" .Values.config.server.environment
  "jwt" (dict "expiresIn" 60)
  "log" (dict
    "excludeParams" (list
      "token" "authorization" "Authorization" "oauth-token"
      "secret" "password" "oldPassword" "oldPasswords"
    )
  )
  "modules" (dict
    "denyToUpdateUserName" true
    "denyToUpdateUserValidParams" true
    "setPhoneOnlyAsNotValid" true
  )
  "notify" (dict
    "url" (printf "http://%s-notification:3002" (include "liquio.fullname" .))
  )
  "oauth" $oauthBase
  "passwordManager" (dict
    "hashingSaltRounds" 10
    "maxAttempts" 5
    "maxAttemptDelay" 3600
    "minPasswordLength" 8
    "rememberLastPasswords" 5
  )
  "pingRoutes" (dict
    "notify" (printf "http://%s-notification:3002/test/ping" (include "liquio.fullname" .))
  )
  "port" (toString .Values.services.idApi.targetPort)
  "redis" (dict
    "defaultTtl" 60
    "host" (include "liquio.redis.host" .)
    "isEnabled" true
    "port" .Values.config.redis.port
  )
  "session" (dict)
  "swagger" false
  "x509" $x509Base
-}}
{{ $idConfigBase := dict
  "default_env" "production"
  "production" $idProductionBase
-}}
{{ $frontConfigBase := dict
  "adminUrl" (printf "%s://admin.%s" (include "liquio.scheme" .) .Values.global.domain)
  "apiUrl" (printf "%s://id-api.%s" (include "liquio.scheme" .) .Values.global.domain)
  "cabinetUrl" (printf "%s://cabinet.%s" (include "liquio.scheme" .) .Values.global.domain)
-}}
{{ $versionsBase := dict
  "api" "1.0.0"
  "frontend" "1.0.0"
-}}
data:
  config.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "id" "config" "config" "base" $idConfigBase) | nindent 4 }}

  front-config.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "id" "config" "front-config.json" "base" $frontConfigBase) | nindent 4 }}

  versions.json: |
{{ include "liquio.renderJsonConfig" (dict "ctx" . "service" "id" "config" "versions.json" "base" $versionsBase) | nindent 4 }}
