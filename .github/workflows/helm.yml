name: Helm

on:
  push:
    branches:
      - main
    paths:
      - 'helm-chart/**'

env:
  HELM_VERSION: v4.1.4
  KUBECONFORM_VERSION: v0.7.0
  KUBE_LINTER_VERSION: v0.8.3
  REGISTRY: ghcr.io
  CHART_PATH: helm-chart/

jobs:
  helm-lint:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install kubeconform
        run: |
          curl -sLo /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${{ env.KUBECONFORM_VERSION }}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          chmod +x /usr/local/bin/kubeconform

      - name: Install kube-linter
        run: |
          curl -sLo /tmp/kube-linter.tar.gz \
            "https://github.com/stackrox/kube-linter/releases/download/${{ env.KUBE_LINTER_VERSION }}/kube-linter-linux.tar.gz"
          tar -xzf /tmp/kube-linter.tar.gz -C /usr/local/bin kube-linter
          chmod +x /usr/local/bin/kube-linter

      - name: helm lint
        run: helm lint helm-chart/

      - name: kubeconform
        run: |
          helm template liquio helm-chart/ \
            | kubeconform -strict -summary -kubernetes-version 1.29.0

      - name: kube-linter
        run: |
          helm template liquio helm-chart/ \
            | kube-linter lint --config helm-chart/.kube-linter.yaml -

  helm-release:
    needs: helm-lint
    if: needs.helm-lint.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check chart version changed
        id: version_check
        run: |
          if git diff --unified=0 "${{ github.event.before }}" "${{ github.sha }}" -- "${{ env.CHART_PATH }}Chart.yaml" | grep -qE '^[+-]version:'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Helm
        if: steps.version_check.outputs.changed == 'true'
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm package
        if: steps.version_check.outputs.changed == 'true'
        run: helm package ${{ env.CHART_PATH }} --destination /tmp/chart-packages/

      - name: Log in to GHCR
        if: steps.version_check.outputs.changed == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.repository_owner }} \
              --password-stdin

      - name: Push chart to GHCR
        if: steps.version_check.outputs.changed == 'true'
        run: |
          helm push /tmp/chart-packages/liquio-*.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Log out of GHCR
        if: always() && steps.version_check.outputs.changed == 'true'
        run: helm registry logout ${{ env.REGISTRY }}
