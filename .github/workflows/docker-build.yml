name: Build and Push Images

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: admin-api
          - service: admin-front
            build-contexts: core=./front-core
          - service: cabinet-api
          - service: cabinet-front
            build-contexts: core=./front-core
          - service: event
          - service: external-reader
          - service: filestorage
          - service: gateway
          - service: id-api
          - service: id-front
          - service: manager
          - service: notification
          - service: pdf-generator
          - service: register
          - service: sign-tool
          - service: task

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read service version
        id: pkg
        run: |
          VERSION=$(jq -r .version ${{ matrix.service }}/package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            # branch push: branch name + short sha
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short,event=branch
            # main push: tag with package.json version + latest
            type=raw,value=${{ steps.pkg.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # PR: tag for traceability (no push)
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          build-contexts: ${{ matrix.build-contexts }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
